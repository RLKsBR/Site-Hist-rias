name: Cleanup malformed paths

on:
  push:
    paths:
      - .github/workflows/cleanup-backslash-paths.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove malformed backslash paths
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          malformed = [path for path in files if "\\" in path]
          for path in malformed:
              subprocess.run(["git", "rm", "--", path], check=True)
          Path(".github/workflows/cleanup-backslash-paths.yml").unlink(missing_ok=True)
          PY
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove malformed uploaded paths" || exit 0
          git push
