      - name: Apply files and cleanup
        shell: python
        run: |
          import pathlib
          import subprocess
          import zipfile

          raw = subprocess.check_output(['git', 'ls-files', '-z'])
          for path in raw.decode('utf-8', 'surrogateescape').split('\0'):
              if path and '\\' in path:
                  subprocess.run(['git', 'rm', '--', path], check=True)

          with zipfile.ZipFile('site-text-update.zip') as archive:
              archive.extractall('.')
          pathlib.Path('site-text-update.zip').unlink(missing_ok=True)
      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch -- '.github/workflows/apply-clean-text-update.yml' '.github/workflows/apply-cover-a-hora-vermelha.yml' '.github/workflows/apply-site-text-update.yml'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix site text update paths"
          git push
